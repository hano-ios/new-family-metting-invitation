<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상견례 초대장</title>
  <style>
    body {
      font-family: 'Apple SD Gothic Neo', sans-serif;
      background: #f8f8f8;
      text-align: center;
      padding: 40px;
      color: #333;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1 { font-size: 22px; margin-bottom: 20px; }
    p { line-height: 1.6; }
    .info { margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>상견례에 초대드립니다</h1>
    <p>
      서로의 가족이 한자리에 모여<br>
      뜻깊은 시간을 갖고자 합니다.<br><br>
      바쁘시겠지만 참석하시어<br>
      자리를 빛내주시면 감사하겠습니다.
    </p>

    <div class="info">
      <p>📅 날짜: 2026년 6월 ○일</p>
      <p>⏰ 시간: 오후 ○시</p>
      <p>📍 장소: ○○식당 (주소)</p>
    </div>
  </div>
</body>
</html>
